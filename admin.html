<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Premium - Journal Conso</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --accent: #EA9216;
            --accent-glow: rgba(234, 146, 22, 0.4);
            --bg-dark: #050608;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-strong: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.5);
            --danger: #ff4757;
            --success: #2ed573;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            font-size: 14px;
        }

        .aura-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 90% 10%, #1e160d 0%, transparent 40%),
                radial-gradient(circle at 10% 90%, #0d1117 0%, #050608 100%);
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px 30px; }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
        }

        #dashboard { display: none; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding: 10px 0; }
        .header h1 { font-size: 1.6rem; font-weight: 900; letter-spacing: -0.5px; }

        .tabs-nav { display: flex; gap: 8px; margin-bottom: 30px; background: rgba(255,255,255,0.02); padding: 5px; border-radius: 14px; width: fit-content; border: 1px solid var(--glass-border); }
        .tab-btn { background: transparent; border: none; color: var(--text-muted); padding: 8px 18px; border-radius: 10px; cursor: pointer; font-weight: 700; transition: 0.3s; font-size: 0.85rem; }
        .tab-btn.active { background: var(--accent); color: #000; box-shadow: 0 4px 15px var(--accent-glow); }

        .logout-btn { color: var(--text-muted); text-decoration: none; font-size: 0.8rem; font-weight: 600; cursor: pointer; }

        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { padding: 20px; }
        .stat-label { font-size: 0.65rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .stat-value { font-size: 1.8rem; font-weight: 950; }

        .main-grid { display: grid; grid-template-columns: 2.2fr 1fr; gap: 15px; margin-bottom: 15px; }
        @media (max-width: 1100px) { .main-grid { grid-template-columns: 1fr; } }

        .panel-header h3 { font-size: 0.8rem; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 20px; }

        /* EDITOR UI */
        .editor-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .editor-card { padding: 25px; position: relative; transition: 0.3s; border: 1px solid var(--glass-border); }
        .editor-card:hover { border-color: rgba(234, 146, 22, 0.3); background: rgba(255,255,255,0.02); }

        .editor-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .editor-tag { font-size: 0.6rem; font-weight: 900; background: rgba(255,255,255,0.05); padding: 4px 8px; border-radius: 6px; color: var(--text-muted); letter-spacing: 1px; }
        .editor-title { font-size: 0.9rem; font-weight: 800; color: #fff; }

        .textarea-wrapper { position: relative; width: 100%; }
        .editor-textarea {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px 50px 15px 15px;
            color: #fff;
            font-family: inherit;
            font-size: 0.95rem;
            line-height: 1.5;
            min-height: 80px;
            resize: vertical;
            outline: none;
            transition: 0.3s;
        }
        .editor-textarea:focus { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); background: rgba(0,0,0,0.3); }

        .save-unit-btn {
            position: absolute;
            right: 12px;
            bottom: 12px;
            background: var(--accent);
            color: #000;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            opacity: 0.6;
        }
        .save-unit-btn:hover { opacity: 1; transform: scale(1.1); }
        .save-unit-btn svg { width: 18px; height: 18px; }

        /* NOTIFICATIONS */
        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            background: var(--success);
            color: #000;
            font-weight: 800;
            border-radius: 12px;
            transform: translateY(100px);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10000;
            box-shadow: 0 10px 30px rgba(46, 213, 115, 0.3);
        }
        #toast.active { transform: translateY(0); }

        /* LOGIN */
        #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card { padding: 40px; width: 100%; max-width: 400px; text-align: center; }
        .btn-primary { width: 100%; background: var(--accent); color: #000; border: none; border-radius: 12px; padding: 15px; font-weight: 900; cursor: pointer; transition: 0.3s; }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .badge-ip { font-family: monospace; color: var(--accent); background: rgba(234, 146, 22, 0.1); padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="aura-bg"></div>
    <div id="toast">C'est en ligne ! ✨</div>

    <div class="container">
        <!-- LOGIN SCREEN -->
        <div id="login-screen">
            <div class="glass-panel login-card">
                <img src="assets/images/logo.png" style="width: 50px; margin-bottom: 20px;">
                <h2 style="margin-bottom: 30px; font-weight:900;">ADMIN PANEL</h2>
                <div style="text-align: left; margin-bottom: 15px;">
                    <label style="font-size: 0.6rem; font-weight: 800; color: var(--accent); margin-bottom: 5px; display: block;">E-MAIL</label>
                    <input type="email" id="email" value="christophek@hotmail.com" style="width:100%; padding:12px; border-radius:10px; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); color:white;">
                </div>
                <div style="text-align: left; margin-bottom: 25px;">
                    <label style="font-size: 0.6rem; font-weight: 800; color: var(--accent); margin-bottom: 5px; display: block;">MOT DE PASSE</label>
                    <input type="password" id="password" style="width:100%; padding:12px; border-radius:10px; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); color:white;">
                </div>
                <button id="btn-login" class="btn-primary">ACCÉDER</button>
            </div>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboard">
            <div class="header">
                <h1>Back-office • <span style="color:var(--accent)">Journal Conso</span></h1>
                <a class="logout-btn" id="btn-logout">Déconnexion</a>
            </div>

            <div class="tabs-nav">
                <button class="tab-btn active" data-tab="analytics">Analytics</button>
                <button class="tab-btn" data-tab="editor">Édition du site</button>
            </div>

            <!-- ANALYTICS TAB -->
            <div id="tab-analytics">
                <div class="grid-stats">
                    <div class="glass-panel stat-card"><div class="stat-label">Visites</div><div class="stat-value" id="stat-total-visits">0</div></div>
                    <div class="glass-panel stat-card"><div class="stat-label">Uniques</div><div class="stat-value" id="stat-unique-visits">0</div></div>
                    <div class="glass-panel stat-card"><div class="stat-label">Engagement</div><div class="stat-value" id="stat-interactions">0%</div></div>
                    <div class="glass-panel stat-card"><div class="stat-label">Messages</div><div class="stat-value" id="stat-messages">0</div></div>
                </div>

                <div class="main-grid">
                    <div class="glass-panel" style="padding: 25px; height: 350px;"><canvas id="visitsChart"></canvas></div>
                    <div class="sidebar-panel">
                        <div class="glass-panel stat-card" style="text-align: center;">
                            <div class="stat-label">Live</div>
                            <div style="font-size: 2.5rem; font-weight: 900;" id="stat-active-users">0</div>
                        </div>
                    </div>
                </div>

                <div class="glass-panel" style="padding: 20px; overflow-x: auto;">
                    <div class="panel-header"><h3>Dernières visites</h3></div>
                    <table>
                        <thead><tr><th>Heure</th><th>Page</th><th>Device</th><th>IP</th></tr></thead>
                        <tbody id="visits-table-body"></tbody>
                    </table>
                </div>
            </div>

            <!-- EDITOR TAB -->
            <div id="tab-editor" style="display: none;">
                <div class="panel-header" style="margin-bottom: 10px;">
                    <div>
                        <h3>Gestion du contenu</h3>
                        <p style="color:var(--text-muted); text-transform: none; margin-top: 5px;">Modifiez les textes directement sans passer par le code.</p>
                    </div>
                </div>

                <div class="editor-grid" id="cms-fields">
                    <!-- Cards will be injected by JS -->
                </div>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            const SUPABASE_URL = 'https://aswxkjibvcadnwujzwcm.supabase.co';
            const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFzd3hramlidmNhZG53dWp6d2NtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNTE3MjMsImV4cCI6MjA5MTgyNzcyM30.DunVTxcbIm0ausnk_4pdnkyn58tdoZf5ioLKqtk5tro';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            let vChart = null;

            const CMS_DEFAULTS = {
                hero_title: "Prenez le contrôle<br>avec <span class=\"highlight\">élégance.</span>",
                hero_desc: "Une application premium, 100% gratuite et sans publicité, conçue pour vous accompagner avec précision. Vos données sont synchronisées sur tous vos appareils en toute sécurité.",
                feature_title: "L'intelligence <br><span class=\"highlight\">discrète.</span>",
                feature_desc: "Tout ce qu'il vous faut pour une pleine conscience, avec une esthétique qui force le respect mutuel.",
                spirit_title: "Une application faite avec <span class=\"highlight\">passion.</span>",
                spirit_desc1: "Journal Conso est née d'un besoin personnel : j'ai créé cet outil pour moi-même, car je cherchais une interface élégante et fiable pour suivre ma consommation sans compromis sur le design.",
                spirit_desc2: "Mes amis m'ont rapidement demandé à l'utiliser, ce qui m'a motivé à la distribuer gratuitement pour tous. L'application est <strong>entièrement gratuite et sans publicité</strong>."
            };

            const CMS_LABELS = {
                hero_title: "TITRE PRINCIPAL (ACCUEIL)",
                hero_desc: "TEXTE DE PRÉSENTATION HERO",
                feature_title: "TITRE SECTION FEATURES",
                feature_desc: "INTRODUCTION FEATURES",
                spirit_title: "TITRE 'L'ESPRIT DU PROJET'",
                spirit_desc1: "HISTOIRE DU PROJET (PARA 1)",
                spirit_desc2: "DÉTAILS GRATUITÉ (PARA 2)"
            };

            // TABS
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const tab = btn.dataset.tab;
                    document.getElementById('tab-analytics').style.display = tab === 'analytics' ? 'block' : 'none';
                    document.getElementById('tab-editor').style.display = tab === 'editor' ? 'block' : 'none';
                    if (tab === 'editor') loadCMS();
                };
            });

            function showToast() {
                const t = document.getElementById('toast');
                t.classList.add('active'); setTimeout(() => t.classList.remove('active'), 3000);
            }

            // LOGIN
            document.getElementById('btn-login').onclick = async () => {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (!error && data.user.email === 'christophek@hotmail.com') showDashboard();
            };
            document.getElementById('btn-logout').onclick = () => { supabase.auth.signOut(); window.location.reload(); };

            function showDashboard() {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadData(); setInterval(loadData, 30000);
            }

            async function loadData() {
                try {
                    const { data: visits } = await supabase.from('site_visits').select('*').order('created_at', { ascending: false });
                    if (visits) {
                        document.getElementById('stat-total-visits').innerText = visits.length;
                        document.getElementById('stat-unique-visits').innerText = new Set(visits.map(v => v.ip_address || v.user_agent)).size;
                        document.getElementById('visits-table-body').innerHTML = visits.slice(0, 15).map(v => `
                            <tr>
                                <td style="font-weight:700">${new Date(v.created_at).toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'})}</td>
                                <td>${v.page_path}</td>
                                <td>${v.device_type === 'mobile' ? '📱' : '💻'}</td>
                                <td><span class="badge-ip">${v.ip_address || '-'}</span></td>
                            </tr>`).join('');
                        renderChart(visits);
                    }
                    const { data: events } = await supabase.from('site_events').select('*');
                    if (events) {
                        const active = events.filter(e => e.event_name === 'heartbeat' && e.created_at >= new Date(Date.now() - 120000).toISOString()).length;
                        document.getElementById('stat-active-users').innerText = active;
                    }
                    const { data: msgs } = await supabase.from('contact_messages').select('*').order('created_at', { ascending: false });
                    if (msgs) document.getElementById('stat-messages').innerText = msgs.length;
                } catch(e) {}
            }

            async function loadCMS() {
                const container = document.getElementById('cms-fields');
                container.innerHTML = '<div style="padding:40px; text-align:center; color:var(--text-muted)">Synchronisation avec Supabase...</div>';
                
                try {
                    const { data } = await supabase.from('site_content').select('*');
                    const values = {};
                    if (data) data.forEach(item => values[item.key] = item.value);

                    container.innerHTML = Object.keys(CMS_DEFAULTS).map(key => `
                        <div class="glass-panel editor-card">
                            <div class="editor-header">
                                <div class="editor-title">${CMS_LABELS[key]}</div>
                                <div class="editor-tag">${key.toUpperCase()}</div>
                            </div>
                            <div class="textarea-wrapper">
                                <textarea class="editor-textarea" data-key="${key}">${values[key] || CMS_DEFAULTS[key]}</textarea>
                                <button class="save-unit-btn" onclick="saveKey('${key}')" title="Enregistrer ce champ">
                                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                                </button>
                            </div>
                        </div>
                    `).join('');
                } catch(e) { console.error(e); }
            }

            window.saveKey = async (key) => {
                const val = document.querySelector(`textarea[data-key="${key}"]`).value;
                const btn = document.querySelector(`.editor-card [onclick="saveKey('${key}')"]`);
                btn.style.opacity = "0.3"; btn.disabled = true;

                try {
                    const { error } = await supabase.from('site_content').upsert({ key, value: val }, { onConflict: 'key' });
                    if (error) throw error;
                    showToast();
                } catch(e) { alert("Erreur: " + e.message); }
                finally { btn.style.opacity = "0.6"; btn.disabled = false; }
            };

            function renderChart(visits) {
                const ctx = document.getElementById('visitsChart'); if (!ctx || !window.Chart) return;
                const days = {}; for (let i = 6; i >= 0; i--) { const d = new Date(); d.setDate(d.getDate() - i); days[d.toISOString().split('T')[0]] = 0; }
                visits.forEach(v => { const dd = v.created_at.split('T')[0]; if (days[dd] !== undefined) days[dd]++; });
                if (vChart) vChart.destroy();
                vChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: Object.keys(days).map(d => d.split('-')[2] + '/' + d.split('-')[1]),
                        datasets: [{ data: Object.values(days), borderColor: '#EA9216', borderWidth: 3, tension: 0.4, fill: true, backgroundColor: 'rgba(234, 146, 22, 0.05)', pointRadius: 4 }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true }, x: { grid: { display: false } } } }
                });
            }

            async function checkSession() {
                const { data: { session } } = await supabase.auth.getSession();
                if (session && session.user.email === 'christophek@hotmail.com') showDashboard();
            }
            checkSession();
        });
    </script>
</body>
</html>
