spirit:
  badge: L'ESPRIT DU PROJET
  title_start: Une application faite
  title_highlight: avec passion.
  desc1: 'Journal Conso est née d''un besoin personnel : j''ai créé cet outil pour
    moi-même, car je cherchais une interface élégante et fiable pour suivre ma consommation
    sans compromis sur le design.'
  desc2: Mes amis m'ont rapidement demandé à l'utiliser, ce qui m'a motivé à la distribuer
    gratuitement pour tous. L'application est entièrement gratuite et sans publicité.
  disclaimer: Si vous appréciez l'application et souhaitez soutenir les frais de développement
    ou de maintien des serveurs cloud, votre contribution est grandement appréciée.
  btn: Soutenir le projet via PayPal
legal_policy:
  title: Mentions Légales
  editor_title: ÉDITEUR
  editor_text: Journal Conso est un projet indépendant créé par ChrisK.
  hosting_title: HÉBERGEMENT DES DONNÉES
  hosting_text: Les données sont hébergées par Supabase Inc. sur des serveurs sécurisés
    situés au sein de l'Union Européenne (AWS Frankfurt), garantissant une conformité
    totale avec le RGPD.
  rights_title: VOS DROITS
  rights_text: Vous disposez d'un droit d'accès, de rectification et de suppression
    totale de vos données. Cette suppression est effectuée instantanément sur simple
    demande via les réglages de l'application.
privacy_policy:
  title: Politique de Confidentialité
  commitment_title: NOTRE ENGAGEMENT
  commitment_text: Votre vie privée est notre priorité absolue. Contrairement à de
    nombreuses applications, Journal Conso ne vend, ne loue et ne partage aucune de
    vos données personnelles.
  usage_title: UTILISATION DES DONNÉES
  usage_text: Vos données (profil, âge, poids, consommations) sont synchronisées uniquement
    pour vous permettre de retrouver votre journal sur tous vos appareils. Elles ne
    sont jamais utilisées pour du ciblage publicitaire ou d'autres fins commerciales.
  confidentiality_title: CONFIDENTIALITÉ
  confidentiality_text: Vos informations de santé restent strictement personnelles.
    Nous n'utilisons aucun traceur tiers et n'exploitons pas vos habitudes de consommation.
  btn_close: Fermer
spirit_desc2: 'Aujourd’hui, l’application est gratuite et sans publicité.

  Si elle vous aide, elle remplit déjà son rôle.'
spirit_disclaimer: Et si vous souhaitez soutenir le projet, vous pouvez le faire librement.
nav_link_download: Télécharger gratuitement
feature4_desc: Vos données restent sauvegardées et accessibles partout.
feature3_desc: Fixez-vous des limites et suivez vos progrès.
feature2_desc: Visualisez vos tendances, vos jours verts et votre consommation moyenne
  en un clin d'œil.
feature1_desc: Enregistrez chaque verre en quelques secondes, incluant le type d'alcool
  et le volume.
feature_desc: 'Suivez votre consommation, visualisez vos habitudes et identifiez vos
  excès en un coup d’œil.

  <br>

  Des outils simples et utiles pour comprendre votre consommation, sans complexité.

  <br>

  Tout est pensé pour vous accompagner au quotidien.'
hero_desc: 'Suivez et comprenez votre consommation d’alcool simplement.

  <br>

  Aujourd’hui, difficile de vraiment savoir où l’on en est.

  Cette application vous aide à y voir clair, simplement.

  <br>

  Suivez votre consommation, comprenez vos habitudes, et gardez le contrôle — sans
  pression, sans jugement.

  <br>

  Gratuite, sans publicité, pensée pour vous.'
spirit_desc1: 'Journal Conso est né d’un besoin personnel :

  mieux comprendre ma consommation, simplement.

  <br>

  Rapidement, tout est devenu plus clair.

  Alors je l’ai ouverte à d’autres.

  '
contact_desc: On discute ? Envoyez-moi un message, j'essaierai d'y répondre le plus
  rapidement possible.
