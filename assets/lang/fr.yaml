legal_content:
  privacy_intro: "L'application Journal Conso s'engage à respecter la vie privée de ses utilisateurs. Cette politique détaille comment vos données sont traitées, stockées et protégées.\n"
  privacy_section1_title: "1. Nature des données collectées"
  privacy_section1_body: "Nous collectons uniquement les données nécessaires au fonctionnement de l'application :\n\n• Données de profil : Nom d'utilisateur (pseudonyme), âge, sexe et poids (nécessaires au calcul théorique de l'alcoolémie).\n• Données d'activité : Historique des consommations (date, heure, type de boisson).\n• Données de compte : Adresse e-mail (uniquement pour le mode Cloud)."
  privacy_section2_title: "2. Stockage et Sécurité"
  privacy_section2_body: "Deux modes de stockage sont proposés pour garantir votre souveraineté numérique :\n\n• Mode Local : Vos données sont stockées exclusivement dans la mémoire sécurisée de votre appareil. Aucune donnée ne quitte votre téléphone.\n• Mode Cloud (Optionnel) : Vos données sont synchronisées via Supabase. Elles sont chiffrées au repos et durant le transfert. L'infrastructure est située en Europe et répond aux standards de sécurité les plus stricts.\n• Exportation JSON : L'utilisateur dispose d'une fonction d'exportation intégrée lui permettant de récupérer l'intégralité de ses données sous format standard JSON, garantissant la portabilité totale de ses informations."
  privacy_section3_title: "3. Utilisation et Non-diffusion"
  privacy_section3_body: "Journal Conso applique une politique de 'Zéro Data Partagée' :\n\n• Vos données ne sont ni vendues, ni louées, ni partagées avec des tiers (régies publicitaires ou assureurs).\n• Les données servent exclusivement à fournir les calculs statistiques et l'historique personnel à l'utilisateur."
  privacy_section4_title: "4. Vos droits (RGPD)"
  privacy_section4_body: "Conformément au Règlement Général sur la Protection des Données, vous disposez d'un droit d'accès, de rectification et de suppression. Vous pouvez supprimer votre compte et l'intégralité des données associées instantanément depuis les réglages de l'application."
  privacy_section5_title: "5. Limites de responsabilité"
  privacy_section5_body: "Journal Conso n'est pas un dispositif médical. Les estimations d'alcoolémie sont purement indicatives et ne doivent jamais être utilisées pour déterminer votre aptitude à conduire."

  info_section1_title: "1. Édition de l'application"
  info_section1_body: "L'application Journal Conso est éditée par :\nChrisK, agissant en qualité de développeur indépendant.\nContact : journalconso@gmail.com."
  info_section2_title: "2. Hébergement"
  info_section2_body: "• Site Web / Landing Page : Hébergé par GitHub Inc.\n• Données Applicatives (Cloud) : Hébergées par Supabase Inc., serveurs situés en Europe (Région AWS eu-central-1, Francfort)."
  info_section3_title: "3. Propriété intellectuelle"
  info_section3_body: "L'interface, le logo et le code source de l'application sont la propriété exclusive de l'éditeur. Toute reproduction sans accord préalable est interdite."
  info_section4_title: "4. Clause de non-responsabilité"
  info_section4_body: "Journal Conso est un outil de sensibilisation et d'auto-suivi à but informatif.\n\n• Absence de valeur médicale : Les calculs d'alcoolémie sont des estimations théoriques et ne remplacent en aucun cas un éthylotest certifié.\n• Sécurité routière : L'application ne doit jamais servir à déterminer votre aptitude à la conduite. En cas de doute, ne prenez pas le volant. L'éditeur décline toute responsabilité en cas d'accident lié à l'utilisation de l'application."

guide:
  title: "NOTICE D'UTILISATION"
  step1_title: "Ajouter une consommation"
  step1_desc: "Utilisez le GROS BOUTON '+' central ou le '+' sur une tranche horaire. Sélectionnez le type, le volume et le degré."
  step2_title: "Ajouter du contexte"
  step2_desc: "Appuyez sur le champ 'Ajouter un contexte...' sous une tranche horaire pour noter l'événement."
  step3_title: "Test de réflexes (Cliquez pour tester)"
  step3_desc: "Évaluez votre temps de réaction indicatif. Ce test aide à prendre conscience de l'altération des facultés."
  step4_title: "Multi-profils & Exports"
  step4_desc: "Chaque utilisateur dispose de ses propres réglages. Vous pouvez EXPORTER un profil seul (JSON) pour le sauvegarder ou l'envoyer par message."
  step5_title: "Import de profil"
  step5_desc: "Dans les réglages d'un profil, utilisez 'Import' pour restaurer des données existantes. Attention : cela remplace les données actuelles de ce profil."
  step6_title: "Sauvegarde Totale"
  step6_desc: "Pour changer de téléphone, utilisez 'SAUVEGARDER TOUT LE PROJET'. Cela génère un fichier contenant tous les profils et tout l'historique."
  step7_title: "Comprendre le graphique"
  step7_desc: "La courbe illustre la fréquence et le volume total de vos consommations sur la période."
  step8_title: "Mode Clair / Sombre"
  step8_desc: "Basculez entre l'ambiance claire ou sombre à l'aide de l'icône Soleil/Lune en haut de l'écran principal."
  step9_title: "Impression des données"
  step9_desc: "Imprimez ou générez un rapport PDF de votre activité directement depuis votre volet de Profil ou des statistiques mensuelles."

